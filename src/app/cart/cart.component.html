<div class="cart-container">
    <h1>Shopping Cart</h1>

    <div *ngIf="cartItems.length === 0" class="empty-cart">
        <p>Your cart is empty!</p>
        <a href="/">Continue Shopping</a>
    </div>

    <div *ngIf="cartItems.length > 0" class="cart-content">
        <div class="cart-items">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of cartItems" class="cart-item">
                        <td class="product-info">
                            <img [src]="item.path" alt="{{ item.name }}" width="60">
                            <div>
                                <p class="product-name">{{ item.name }}</p>
                                <p class="product-seller">{{ item.seller }}</p>
                            </div>
                        </td>
                        <td>Rs. {{ item.price }}</td>
                        <td>
                            <input type="number" min="1" [value]="item.quantity" #quantityInput
                                (change)="updateQuantity(item.id, quantityInput.value)" class="quantity-input">
                        </td>
                        <td>Rs. {{ item.price * item.quantity }}</td>
                        <td>
                            <button class="remove-btn" (click)="removeFromCart(item.id)">Remove</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="cart-summary">
            <div class="summary-item">
                <span>Subtotal:</span>
                <span>Rs. {{ totalPrice }}</span>
            </div>
            <div class="summary-item">
                <span>Shipping:</span>
                <span>Free</span>
            </div>
            <div class="summary-item total">
                <span>Total:</span>
                <span>Rs. {{ totalPrice }}</span>
            </div>
            <button class="checkout-btn" (click)="checkout()">Checkout</button>
            <button class="clear-cart-btn" (click)="clearCart()">Clear Cart</button>
        </div>
    </div>
</div>
